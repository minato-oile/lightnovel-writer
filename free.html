<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>執筆蔵 — ラノベ執筆支援ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0c0a;
  --bg2: #15120e;
  --bg3: #1d1914;
  --bg4: #252018;
  --border: rgba(180,150,90,0.15);
  --border2: rgba(180,150,90,0.3);
  --gold: #c8a25a;
  --gold2: #e8c47a;
  --gold-dim: rgba(200,162,90,0.12);
  --red: #c85a5a;
  --red-dim: rgba(200,90,90,0.12);
  --text: #e8e0d0;
  --text2: #a89878;
  --text3: #6a5c44;
  --radius: 6px;
  --serif: 'Shippori Mincho', serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 10;
}

.logo {
  padding: 28px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.logo-main {
  font-family: var(--serif);
  font-size: 20px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: .1em;
}

.logo-sub {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: .15em;
  margin-top: 4px;
}

nav { flex: 1; padding: 16px 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 20px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .05em;
  border-left: 2px solid transparent;
}

.nav-item:hover { color: var(--text); background: var(--gold-dim); }
.nav-item.active { color: var(--gold); border-left-color: var(--gold); background: var(--gold-dim); }

.nav-icon { font-size: 15px; width: 18px; text-align: center; }

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-export, .btn-import {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px;
  font-size: 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
  letter-spacing: .05em;
}

.btn-export {
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  color: var(--gold);
}

.btn-export:hover { background: rgba(200,162,90,0.2); }

.btn-import {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text3);
}

.btn-import:hover { color: var(--text2); border-color: var(--border2); }

/* ── MAIN ── */
.main {
  margin-left: 220px;
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
}

.page-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: .08em;
}

.btn-add {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  background: var(--gold);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .05em;
}

.btn-add:hover { background: var(--gold2); }

.content { padding: 28px 32px; flex: 1; }

/* ── SEARCH ── */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  align-items: center;
}

.search-input {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  transition: border .2s;
  outline: none;
}

.search-input:focus { border-color: var(--border2); }
.search-input::placeholder { color: var(--text3); }

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

.char-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}

.char-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--gold);
  opacity: 0;
  transition: opacity .2s;
}

.char-card:hover { border-color: var(--border2); background: var(--bg4); }
.char-card:hover::before { opacity: 1; }

.char-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif);
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 12px;
}

.char-name {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: .06em;
  margin-bottom: 3px;
}

.char-ruby {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .08em;
  margin-bottom: 10px;
}

.char-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--gold-dim);
  border: 1px solid var(--border);
  color: var(--text2);
  letter-spacing: .05em;
}

.char-memo {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-actions {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.btn-sm {
  flex: 1;
  padding: 5px;
  font-size: 11px;
  font-family: inherit;
  border-radius: 4px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .05em;
}

.btn-edit { background: var(--bg4); border: 1px solid var(--border); color: var(--text2); }
.btn-edit:hover { color: var(--gold); border-color: var(--border2); }
.btn-del { background: transparent; border: 1px solid var(--border); color: var(--text3); }
.btn-del:hover { background: var(--red-dim); border-color: rgba(200,90,90,0.3); color: var(--red); }

/* ── PLOT LIST ── */
.plot-list { display: flex; flex-direction: column; gap: 12px; }

.plot-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  transition: all .2s;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}

.plot-card:hover { border-color: var(--border2); background: var(--bg4); }

.plot-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--gold);
  background: var(--gold-dim);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 3px 8px;
  flex-shrink: 0;
  margin-top: 2px;
}

.plot-body { flex: 1; }

.plot-title {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: .06em;
  margin-bottom: 6px;
}

.plot-synopsis {
  font-size: 12px;
  color: var(--text3);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.plot-chars {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.plot-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  margin-top: 2px;
}

/* ── EMPTY STATE ── */
.empty {
  text-align: center;
  padding: 64px 0;
}

.empty-icon { font-size: 40px; margin-bottom: 14px; opacity: .4; }

.empty-title {
  font-family: var(--serif);
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 6px;
  letter-spacing: .06em;
}

.empty-sub { font-size: 12px; color: var(--text3); }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  width: 100%;
  max-width: 540px;
  max-height: 88vh;
  overflow-y: auto;
  padding: 28px;
}

.modal-title {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: .08em;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-group { margin-bottom: 14px; }

.form-label {
  display: block;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .1em;
  margin-bottom: 6px;
}

.form-input, .form-textarea, .form-select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 9px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border .2s;
}

.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--border2); }
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-textarea { resize: vertical; min-height: 80px; line-height: 1.7; }
.form-select { appearance: none; cursor: pointer; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}

.btn-cancel {
  flex: 1;
  padding: 9px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text3);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: all .2s;
}

.btn-cancel:hover { color: var(--text2); border-color: var(--border2); }

.btn-save {
  flex: 2;
  padding: 9px;
  background: var(--gold);
  border: none;
  border-radius: var(--radius);
  color: var(--bg);
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
}

.btn-save:hover { background: var(--gold2); }

/* ── MEMO PAGE ── */
.memo-area {
  width: 100%;
  min-height: 400px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Noto Serif JP', serif;
  line-height: 1.9;
  outline: none;
  resize: vertical;
  transition: border .2s;
}

.memo-area:focus { border-color: var(--border2); }
.memo-area::placeholder { color: var(--text3); }

.memo-saved {
  font-size: 11px;
  color: var(--text3);
  margin-top: 8px;
  letter-spacing: .05em;
  transition: opacity .3s;
}

/* ── IMPORT HIDDEN ── */
#fileInput { display: none; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--bg4);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 13px;
  color: var(--gold);
  z-index: 999;
  opacity: 0;
  transform: translateY(8px);
  transition: all .3s;
  pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

/* ── CHAR SELECT MULTI ── */
.char-check-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 140px;
  overflow-y: auto;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
}

.char-check-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 4px;
  cursor: pointer;
  transition: background .15s;
}

.char-check-item:hover { background: var(--gold-dim); }
.char-check-item input { accent-color: var(--gold); }
.char-check-item label { font-size: 13px; color: var(--text2); cursor: pointer; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-main">執筆蔵</div>
    <div class="logo-sub">LIGHT NOVEL WRITER</div>
  </div>
  <nav>
    <div class="nav-item active" onclick="showPage('chars')">
      <span class="nav-icon">人</span> キャラクター
    </div>
    <div class="nav-item" onclick="showPage('plots')">
      <span class="nav-icon">章</span> プロット
    </div>
    <div class="nav-item" onclick="showPage('world')">
      <span class="nav-icon">世</span> 世界観メモ
    </div>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-export" onclick="exportData()">↓ データを書き出す</button>
    <button class="btn-import" onclick="document.getElementById('fileInput').click()">↑ データを読み込む</button>
    <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- キャラクターページ -->
  <div id="page-chars">
    <div class="topbar">
      <span class="page-title">キャラクター一覧</span>
      <button class="btn-add" onclick="openCharModal()">＋ 登録する</button>
    </div>
    <div class="content">
      <div class="search-bar">
        <input class="search-input" id="charSearch" placeholder="名前で検索…" oninput="renderChars()">
      </div>
      <div class="card-grid" id="charGrid"></div>
    </div>
  </div>

  <!-- プロットページ -->
  <div id="page-plots" style="display:none">
    <div class="topbar">
      <span class="page-title">プロット管理</span>
      <button class="btn-add" onclick="openPlotModal()">＋ 章を追加</button>
    </div>
    <div class="content">
      <div class="plot-list" id="plotList"></div>
    </div>
  </div>

  <!-- 世界観メモページ -->
  <div id="page-world" style="display:none">
    <div class="topbar">
      <span class="page-title">世界観メモ</span>
    </div>
    <div class="content">
      <p style="font-size:12px;color:var(--text3);margin-bottom:14px;letter-spacing:.05em">設定・用語集・あらすじ・なんでも自由に</p>
      <textarea class="memo-area" id="worldMemo" placeholder="世界の設定、魔法の仕組み、用語集、あらすじの下書き…&#10;なんでも自由にメモしてください。" oninput="saveMemo()"></textarea>
      <div class="memo-saved" id="memoSaved">自動保存しました</div>
    </div>
  </div>
</main>

<!-- キャラモーダル -->
<div class="overlay" id="charOverlay">
  <div class="modal">
    <div class="modal-title" id="charModalTitle">キャラクターを登録</div>
    <input type="hidden" id="charEditId">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">名前 *</label>
        <input class="form-input" id="cName" placeholder="例：霧島 凛">
      </div>
      <div class="form-group">
        <label class="form-label">読み</label>
        <input class="form-input" id="cRuby" placeholder="例：きりしま りん">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">年齢</label>
        <input class="form-input" id="cAge" placeholder="例：17歳">
      </div>
      <div class="form-group">
        <label class="form-label">性別</label>
        <select class="form-select" id="cGender">
          <option value="">未設定</option>
          <option>女性</option>
          <option>男性</option>
          <option>その他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">一人称</label>
        <input class="form-input" id="cPronoun" placeholder="例：私、俺、僕、うち">
      </div>
      <div class="form-group">
        <label class="form-label">役割</label>
        <select class="form-select" id="cRole">
          <option value="">未設定</option>
          <option>主人公</option>
          <option>ヒロイン</option>
          <option>ライバル</option>
          <option>友人</option>
          <option>師匠</option>
          <option>悪役</option>
          <option>その他</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">外見・特徴</label>
      <textarea class="form-textarea" id="cAppear" placeholder="髪の色・目の色・服装・体格など…" style="min-height:60px"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">性格</label>
      <textarea class="form-textarea" id="cPersonality" placeholder="内向的、天然、クール、ツンデレ…" style="min-height:60px"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">口癖・話し方</label>
      <input class="form-input" id="cCatchphrase" placeholder="例：「なにを言ってるの？」">
    </div>
    <div class="form-group">
      <label class="form-label">背景・設定メモ</label>
      <textarea class="form-textarea" id="cBio" placeholder="過去・能力・秘密…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCharModal()">キャンセル</button>
      <button class="btn-save" onclick="saveChar()">保存する</button>
    </div>
  </div>
</div>

<!-- プロットモーダル -->
<div class="overlay" id="plotOverlay">
  <div class="modal">
    <div class="modal-title" id="plotModalTitle">章を追加</div>
    <input type="hidden" id="plotEditId">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">章番号 *</label>
        <input class="form-input" id="pNum" placeholder="例：第1章">
      </div>
      <div class="form-group">
        <label class="form-label">タイトル *</label>
        <input class="form-input" id="pTitle" placeholder="例：出会いの日">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">あらすじ</label>
      <textarea class="form-textarea" id="pSynopsis" placeholder="この章で起きること、山場、結末…"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">登場キャラクター</label>
      <div class="char-check-list" id="charCheckList"></div>
    </div>
    <div class="form-group">
      <label class="form-label">メモ・補足</label>
      <textarea class="form-textarea" id="pNote" placeholder="伏線、描写のポイント、BGMイメージ…" style="min-height:60px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePlotModal()">キャンセル</button>
      <button class="btn-save" onclick="savePlot()">保存する</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── FREE TIER ──
const IS_FREE = true;
const FREE_LIMITS = { chars: 3, plots: 5 };

// ── STATE ──
let state = { chars: [], plots: [], world: '' };

function load() {
  try {
    const s = localStorage.getItem('shitsuzo_v1');
    if (s) state = JSON.parse(s);
  } catch(e) {}
  document.getElementById('worldMemo').value = state.world || '';
  renderChars();
  renderPlots();
}

function save() {
  localStorage.setItem('shitsuzo_v1', JSON.stringify(state));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ── NAVIGATION ──
function showPage(name) {
  ['chars','plots','world'].forEach(p => {
    document.getElementById('page-'+p).style.display = p===name ? 'block' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', ['chars','plots','world'][i]===name);
  });
  if (name === 'plots') renderCharCheckList();
}

// ── CHARACTERS ──
function renderChars() {
  const q = document.getElementById('charSearch').value.trim().toLowerCase();
  const filtered = state.chars.filter(c => c.name.toLowerCase().includes(q) || (c.ruby||'').toLowerCase().includes(q));
  const grid = document.getElementById('charGrid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">人</div>
      <div class="empty-title">${q ? '見つかりませんでした' : 'キャラクターがいません'}</div>
      <div class="empty-sub">${q ? '別のキーワードで検索してください' : '「＋ 登録する」からキャラクターを追加しましょう'}</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(c => `
    <div class="char-card">
      <div class="char-avatar">${c.name[0]}</div>
      <div class="char-name">${esc(c.name)}</div>
      ${c.ruby ? `<div class="char-ruby">${esc(c.ruby)}</div>` : '<div style="margin-bottom:10px"></div>'}
      <div class="char-tags">
        ${c.role ? `<span class="tag">${esc(c.role)}</span>` : ''}
        ${c.age ? `<span class="tag">${esc(c.age)}</span>` : ''}
        ${c.gender ? `<span class="tag">${esc(c.gender)}</span>` : ''}
        ${c.pronoun ? `<span class="tag">一人称：${esc(c.pronoun)}</span>` : ''}
      </div>
      ${c.bio ? `<div class="char-memo">${esc(c.bio)}</div>` : ''}
      <div class="card-actions">
        <button class="btn-sm btn-edit" onclick="openCharModal('${c.id}')">編集</button>
        <button class="btn-sm btn-del" onclick="deleteChar('${c.id}')">削除</button>
      </div>
    </div>
  `).join('');
}

function openCharModal(id) {
  const fields = ['cName','cRuby','cAge','cGender','cPronoun','cRole','cAppear','cPersonality','cCatchphrase','cBio'];
  fields.forEach(f => document.getElementById(f).value = '');
  document.getElementById('charEditId').value = '';

  if (id) {
    const c = state.chars.find(x => x.id===id);
    if (!c) return;
    document.getElementById('charModalTitle').textContent = 'キャラクターを編集';
    document.getElementById('charEditId').value = id;
    document.getElementById('cName').value = c.name||'';
    document.getElementById('cRuby').value = c.ruby||'';
    document.getElementById('cAge').value = c.age||'';
    document.getElementById('cGender').value = c.gender||'';
    document.getElementById('cPronoun').value = c.pronoun||'';
    document.getElementById('cRole').value = c.role||'';
    document.getElementById('cAppear').value = c.appear||'';
    document.getElementById('cPersonality').value = c.personality||'';
    document.getElementById('cCatchphrase').value = c.catchphrase||'';
    document.getElementById('cBio').value = c.bio||'';
  } else {
    document.getElementById('charModalTitle').textContent = 'キャラクターを登録';
  }
  document.getElementById('charOverlay').classList.add('open');
}

function closeCharModal() { document.getElementById('charOverlay').classList.remove('open'); }

function saveChar() {
  const id = document.getElementById('charEditId').value;
  if (IS_FREE && !id && state.chars.length >= FREE_LIMITS.chars) {
    showUpgradeToast('キャラクター'); return;
  }
  const name = document.getElementById('cName').value.trim();
  if (!name) { showToast('名前を入力してください'); return; }
  const char = {
    id: id || uid(),
    name, ruby: document.getElementById('cRuby').value.trim(),
    age: document.getElementById('cAge').value.trim(),
    gender: document.getElementById('cGender').value,
    pronoun: document.getElementById('cPronoun').value.trim(),
    role: document.getElementById('cRole').value,
    appear: document.getElementById('cAppear').value.trim(),
    personality: document.getElementById('cPersonality').value.trim(),
    catchphrase: document.getElementById('cCatchphrase').value.trim(),
    bio: document.getElementById('cBio').value.trim(),
  };
  if (id) { const i = state.chars.findIndex(x=>x.id===id); state.chars[i] = char; }
  else { state.chars.push(char); }
  save(); closeCharModal(); renderChars();
  showToast(id ? '更新しました' : '登録しました');
}

function deleteChar(id) {
  if (!confirm('このキャラクターを削除しますか？')) return;
  state.chars = state.chars.filter(c => c.id !== id);
  save(); renderChars();
  showToast('削除しました');
}

// ── PLOTS ──
function renderPlots() {
  const list = document.getElementById('plotList');
  if (state.plots.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">章</div>
      <div class="empty-title">章がありません</div>
      <div class="empty-sub">「＋ 章を追加」からプロットを作成しましょう</div>
    </div>`;
    return;
  }
  list.innerHTML = state.plots.map(p => {
    const chars = (p.chars||[]).map(id => state.chars.find(c=>c.id===id)).filter(Boolean);
    return `<div class="plot-card">
      <div class="plot-num">${esc(p.num)}</div>
      <div class="plot-body">
        <div class="plot-title">${esc(p.title)}</div>
        ${p.synopsis ? `<div class="plot-synopsis">${esc(p.synopsis)}</div>` : ''}
        ${chars.length ? `<div class="plot-chars">${chars.map(c=>`<span class="tag">${esc(c.name)}</span>`).join('')}</div>` : ''}
        ${p.note ? `<div style="font-size:11px;color:var(--text3);margin-top:6px">📝 ${esc(p.note)}</div>` : ''}
      </div>
      <div class="plot-actions">
        <button class="btn-sm btn-edit" onclick="openPlotModal('${p.id}')" style="width:48px">編集</button>
        <button class="btn-sm btn-del" onclick="deletePlot('${p.id}')" style="width:48px">削除</button>
      </div>
    </div>`;
  }).join('');
}

function renderCharCheckList(selectedIds) {
  const list = document.getElementById('charCheckList');
  if (state.chars.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 8px">まずキャラクターを登録してください</div>';
    return;
  }
  list.innerHTML = state.chars.map(c => `
    <label class="char-check-item">
      <input type="checkbox" value="${c.id}" ${(selectedIds||[]).includes(c.id) ? 'checked' : ''}>
      <span>${esc(c.name)}${c.role ? ` <span style="font-size:10px;color:var(--text3)">${esc(c.role)}</span>` : ''}</span>
    </label>
  `).join('');
}

function getSelectedChars() {
  return Array.from(document.querySelectorAll('#charCheckList input:checked')).map(el => el.value);
}

function openPlotModal(id) {
  ['pNum','pTitle','pSynopsis','pNote'].forEach(f => document.getElementById(f).value = '');
  document.getElementById('plotEditId').value = '';
  renderCharCheckList([]);

  if (id) {
    const p = state.plots.find(x=>x.id===id);
    if (!p) return;
    document.getElementById('plotModalTitle').textContent = '章を編集';
    document.getElementById('plotEditId').value = id;
    document.getElementById('pNum').value = p.num||'';
    document.getElementById('pTitle').value = p.title||'';
    document.getElementById('pSynopsis').value = p.synopsis||'';
    document.getElementById('pNote').value = p.note||'';
    renderCharCheckList(p.chars||[]);
  } else {
    document.getElementById('plotModalTitle').textContent = '章を追加';
    const n = state.plots.length + 1;
    document.getElementById('pNum').value = `第${n}章`;
  }
  document.getElementById('plotOverlay').classList.add('open');
}

function closePlotModal() { document.getElementById('plotOverlay').classList.remove('open'); }

function savePlot() {
  const id = document.getElementById('plotEditId').value;
  if (IS_FREE && !id && state.plots.length >= FREE_LIMITS.plots) {
    showUpgradeToast('章'); return;
  }
  const num = document.getElementById('pNum').value.trim();
  const title = document.getElementById('pTitle').value.trim();
  if (!num || !title) { showToast('章番号とタイトルを入力してください'); return; }
  const plot = {
    id: id || uid(),
    num, title,
    synopsis: document.getElementById('pSynopsis').value.trim(),
    note: document.getElementById('pNote').value.trim(),
    chars: getSelectedChars(),
  };
  if (id) { const i = state.plots.findIndex(x=>x.id===id); state.plots[i] = plot; }
  else { state.plots.push(plot); }
  save(); closePlotModal(); renderPlots();
  showToast(id ? '更新しました' : '追加しました');
}

function deletePlot(id) {
  if (!confirm('この章を削除しますか？')) return;
  state.plots = state.plots.filter(p => p.id !== id);
  save(); renderPlots();
  showToast('削除しました');
}

// ── WORLD MEMO ──
let memoTimer;
function saveMemo() {
  state.world = document.getElementById('worldMemo').value;
  save();
  const el = document.getElementById('memoSaved');
  el.style.opacity = '1';
  clearTimeout(memoTimer);
  memoTimer = setTimeout(() => el.style.opacity = '0', 2000);
}

// ── EXPORT / IMPORT ──
function exportData() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `shitsuzo_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('書き出しました');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!confirm('現在のデータを上書きします。よろしいですか？')) return;
      state = data;
      save();
      document.getElementById('worldMemo').value = state.world || '';
      renderChars();
      renderPlots();
      showToast('読み込みました');
    } catch(err) {
      showToast('ファイルの形式が正しくありません');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── TOAST ──
let toastTimer;
function showUpgradeToast(type) {
  const t = document.getElementById('toast');
  t.innerHTML = `無料版は${type}の上限に達しました。<br><a href="https://yamatojo.gumroad.com/l/lightnovel-writer" target="_blank" style="color:var(--gold2);text-decoration:underline">有料版にアップグレード →</a>`;
  t.style.lineHeight = '1.7';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 5000);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── UTILS ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
load();
</script>
